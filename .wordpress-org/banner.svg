<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" width="1544" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="55%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="markPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="markSecondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#99f6e4"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <linearGradient id="markAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ccfbf1"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
  </defs>

  <rect width="1544" height="500" fill="url(#bg)"/>

  <!-- soft glow accents -->
  <circle cx="1300" cy="90" r="280" fill="#2dd4bf" opacity="0.10"/>
  <circle cx="180" cy="470" r="240" fill="#22d3ee" opacity="0.10"/>

  <!-- brand mark -->
  <g transform="translate(150,110) scale(1.45)">
    <path d="M 60 60 L 125 60 Q 138 60 138 73 L 138 77 Q 138 90 125 90 L 85 90 Q 75 90 75 80 L 75 70 Q 75 60 85 60 Z" fill="url(#markPrimary)"/>
    <path d="M 80 95 Q 68 95 68 107 L 68 113 Q 68 125 80 125 L 115 125 Q 128 125 128 112 L 128 108 Q 128 95 115 95 Z" fill="url(#markSecondary)"/>
    <path d="M 115 130 Q 128 130 128 143 L 128 147 Q 128 160 115 160 L 65 160 Q 52 160 52 147 L 52 143 Q 52 130 65 130 Z" fill="url(#markAccent)"/>
    <circle cx="100" cy="110" r="6" fill="#ccfbf1"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="470" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="104" font-weight="800" fill="#ffffff" letter-spacing="-2">Tymeslot</text>
  <text x="474" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="40" font-weight="500" fill="#ccfbf1">Stop the back-and-forth. Start booking.</text>
  <text x="474" y="372" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#99f6e4">Booking block, shortcode &amp; floating button for WordPress.</text>
</svg>
